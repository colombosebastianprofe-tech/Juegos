<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Duelo Digital</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2d3436; color: white; text-align: center; padding: 50px 20px; }
        .panel-card { max-width: 400px; margin: auto; background: #353b48; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #00b894; }
        .btn-reset { 
            background: #d63031; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px;
            box-shadow: 0 4px 0 #8e1c1c;
        }
        .btn-reset:active { transform: translateY(3px); box-shadow: none; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; text-align: center; font-size: 1.1rem; }
        .status { margin-top: 20px; font-style: italic; color: #aaa; }
    </style>
</head>
<body>

<div class="panel-card">
    <h1>👑 Panel de Control</h1>
    <p>Introduce el PIN para resetear los puntajes</p>
    
    <input type="password" id="pin" placeholder="PIN de Seguridad">
    <br>
    <button class="btn-reset" onclick="resetScores()">RESETEAR MARCADOR A 0</button>
    
    <div class="status" id="status">Esperando acción...</div>
</div>
<script>
    // ... (Mantén tu configuración de Firebase igual) ...

    function resetScores() {
        const pin = document.getElementById('pin').value;
        if (pin === "1234") {
            // Seteamos puntos a 0 y detenemos cualquier juego activo
            db.ref('/').update({
                scores: { Bondiolas: 0, Imperio: 0 },
                gameState: "waiting",
                endTime: 0
            }).then(() => alert("Marcador reseteado y juego detenido."));
        } else { alert("PIN Incorrecto"); }
    }

    function startMatch() {
        const pin = document.getElementById('pin').value;
        if (pin === "1234") {
            const durationInSeconds = 300; // 5 minutos
            const endTime = Date.now() + (durationInSeconds * 1000);
            
            // Publicamos en Firebase que el juego EMPEZÓ y cuándo TERMINA
            db.ref('/').update({
                gameState: "playing",
                endTime: endTime,
                scores: { Bondiolas: 0, Imperio: 0 } // Opcional: resetear al empezar
            }).then(() => alert("¡PARTIDA INICIADA EN TODOS LOS DISPOSITIVOS!"));
        } else { alert("PIN Incorrecto"); }
    }
</script>

<button class="btn-main" style="background: #0984e3;" onclick="startMatch()">🚀 INICIAR PARTIDA (5 MIN)</button>
<button class="btn-reset" onclick="resetScores()">🛑 RESETEAR / DETENER</button>
