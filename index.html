<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duelo Digital: Bondiolas vs Imperio</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --bondiolas: #d63031; 
            --imperio: #0984e3; 
            --bg: #dfe6e9; 
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px; 
            color: #2d3436; 
        }
        .container { 
            max-width: 600px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        h1 { color: #2d3436; font-size: 1.8rem; margin-bottom: 10px; }
        
        /* Marcador */
        .scoreboard { 
            display: flex; 
            justify-content: space-around; 
            margin: 20px 0; 
            background: #2d3436; 
            padding: 15px; 
            border-radius: 15px; 
            color: white;
        }
        .score-box { text-align: center; }
        .score-val { font-size: 2.5rem; display: block; font-weight: 900; }
        .score-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Timer */
        .timer-wrapper { margin-bottom: 20px; }
        #timer { font-size: 3rem; font-weight: 900; color: #eb4d4b; font-family: 'Courier New', Courier, monospace; }

        /* Preguntas */
        .question { 
            text-align: left; 
            background: #f9f9f9; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            transition: all 0.3s ease;
        }
        .question p { margin-top: 0; font-weight: bold; font-size: 1.1rem; }
        .answered { opacity: 0.4; pointer-events: none; filter: grayscale(1); }

        /* Inputs y Botones */
        input, select { 
            width: 90%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            font-size: 1rem; 
        }
        .btn-main { 
            padding: 15px 40px; 
            background: #00b894; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #009475;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }

        /* Opciones de respuesta */
        .option-label {
            display: block;
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 2px solid #eee;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-label:hover { background: #f1f2f6; border-color: #ccc; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <h1>🛡️ Ciudadanía Digital</h1>
        <p>¡Defiende a tu equipo respondiendo correctamente!</p>
        <input type="text" id="username" placeholder="Tu Apodo">
        <select id="team-select">
            <option value="Bondiolas">🥩 Equipo Bondiolas</option>
            <option value="Imperio">👑 Equipo Imperio</option>
        </select>
        <br><br>
        <button class="btn-main" onclick="startGame()">¡A JUGAR!</button>
    </div>

    <div id="game-area" class="hidden">
        <div class="timer-wrapper">
            <div id="timer">05:00</div>
        </div>

        <div class="scoreboard">
            <div class="score-box" style="color: var(--bondiolas)">
                <span class="score-label">Bondiolas</span>
                <span id="score-b" class="score-val">0</span>
            </div>
            <div class="score-box" style="color: var(--imperio)">
                <span class="score-label">Imperio</span>
                <span id="score-i" class="score-val">0</span>
            </div>
        </div>

        <div id="questions-list"></div>
    </div>

    <div id="results" class="hidden">
        <h1>🏁 ¡FIN DEL TIEMPO!</h1>
        <div id="winner-text" style="font-size: 2rem; margin: 20px 0; font-weight: 900;"></div>
        <button class="btn-main" style="background: #636e72; box-shadow: 0 4px 0 #2d3436;" onclick="location.reload()">Reiniciar Batalla</button>
    </div>
</div>

<script>
    // CONFIGURACIÓN DE TU FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDRy05apGD1fffZlhjj6O5Z4R1epkxNJcM",
        authDomain: "duelodigital-4e16c.firebaseapp.com",
        databaseURL: "https://duelodigital-4e16c-default-rtdb.firebaseio.com",
        projectId: "duelodigital-4e16c",
        storageBucket: "duelodigital-4e16c.firebasestorage.app",
        messagingSenderId: "547123191686",
        appId: "1:547123191686:web:9b7dcbb31cb956d35cd607"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const questions = [
        { q: "¿Qué es la Huella Digital?", a: ["Una marca en el mouse", "El rastro de lo que haces en internet", "Una clave de acceso"], c: 1 },
        { q: "Si alguien te pide fotos privadas, debes:", a: ["Mandarlas", "Bloquear y avisar a un adulto", "Pedirle fotos a cambio"], c: 1 },
        { q: "¿Qué es el Grooming?", a: ["Un estilo de peinado", "Acoso de un adulto a un menor", "Limpiar la PC"], c: 1 },
        { q: "Una contraseña segura tiene:", a: ["Tu nombre", "12345", "Letras, números y símbolos"], c: 2 },
        { q: "¿Qué son las Fake News?", a: ["Noticias graciosas", "Noticias falsas que engañan", "Noticias viejas"], c: 1 },
        { q: "Si te insultan en un juego online:", a: ["Insultas de vuelta", "Ignoras y reportas", "Apagas la PC para siempre"], c: 1 },
        { q: "¿Qué es el Sharenting?", a: ["Compartir archivos", "Padres exponiendo a hijos en redes", "Prestar la cuenta de TikTok"], c: 1 },
        { q: "¿Es bueno aceptar desconocidos en redes?", a: ["Sí, para tener seguidores", "No, es un riesgo de seguridad", "Solo si tienen fotos lindas"], c: 1 },
        { q: "¿Qué es el Ciberbullying?", a: ["Acoso entre pares en redes", "Un virus informático", "Comprar seguidores"], c: 0 },
        { q: "Antes de subir una foto de un amigo:", a: ["Le pido permiso", "La subo y lo etiqueto", "Le pongo un filtro"], c: 0 },
        { q: "¿Qué significa 'Privacidad'?", a: ["Que nadie me vea", "Elegir quién ve mi contenido", "Borrar todas mis fotos"], c: 1 },
        { q: "Un perfil 'Público' significa:", a: ["Solo mis amigos ven todo", "Cualquiera en el mundo puede verlo", "Solo el gobierno lo ve"], c: 1 },
        { q: "¿Qué es el Phishing?", a: ["Pescar en internet", "Estafa para robar tus claves", "Un juego de barcos"], c: 1 },
        { q: "Si ves que acosan a alguien:", a: ["Me río", "Soy un espectador activo y ayudo", "No hago nada"], c: 1 },
        { q: "¿Qué es el Oversharing?", a: ["Tener mucho internet", "Compartir demasiada info personal", "Prestar el celular"], c: 1 },
        { q: "Tus datos personales son:", a: ["Públicos", "Un tesoro que debes proteger", "Aburridos"], c: 1 },
        { q: "Si una oferta en internet parece 'mágica':", a: ["Seguro es una estafa", "Aprovecho rápido", "Pido dos"], c: 0 },
        { q: "¿Los términos y condiciones se leen?", a: ["Nunca", "Es recomendable para saber qué hacen con tus datos", "Solo si tienen dibujos"], c: 1 },
        { q: "La netiquette es:", a: ["Una marca de ropa", "Normas de respeto en internet", "Un tipo de cable"], c: 1 },
        { q: "¿Internet olvida lo que subes?", a: ["Sí, a los dos días", "No, lo digital es casi permanente", "Solo si borras el historial"], c: 1 }
    ];

    let myTeam = "";

    // Sincronización en tiempo real
    db.ref('scores').on('value', (s) => {
        const val = s.val() || { Bondiolas: 0, Imperio: 0 };
        document.getElementById('score-b').innerText = val.Bondiolas || 0;
        document.getElementById('score-i').innerText = val.Imperio || 0;
    });

    function startGame() {
        if(!document.getElementById('username').value) return alert("¡Pon un nombre!");
        myTeam = document.getElementById('team-select').value;
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        render();
        timer(300);
    }

    function render() {
        const list = document.getElementById('questions-list');
        questions.forEach((q, i) => {
            let h = `<div class="question" id="q${i}"><p>${i+1}. ${q.q}</p>`;
            q.a.forEach((opt, idx) => {
                h += `<label class="option-label"><input type="radio" name="q${i}" onclick="ans(${i},${idx})"> ${opt}</label>`;
            });
            list.innerHTML += h + `</div>`;
        });
    }

    function ans(qI, choice) {
        const d = document.getElementById(`q${qI}`);
        d.classList.add('answered');
        if(choice === questions[qI].c) {
            d.style.borderColor = "#00b894";
            db.ref('scores/' + myTeam).transaction(v => (v || 0) + 1);
        } else {
            d.style.borderColor = "#fab1a0";
        }
    }

    function timer(s) {
        let t = s;
        const inv = setInterval(() => {
            let m = Math.floor(t / 60), sec = t % 60;
            document.getElementById('timer').innerText = `${m}:${sec<10?'0'+sec:sec}`;
            if(--t < 0) { clearInterval(inv); end(); }
        }, 1000);
    }

    function end() {
        document.getElementById('game-area').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        const b = parseInt(document.getElementById('score-b').innerText);
        const i = parseInt(document.getElementById('score-i').innerText);
        document.getElementById('winner-text').innerText = b > i ? "🏆 ¡VICTORIA DE LAS BONDIOLAS!" : i > b ? "🏆 ¡VICTORIA DEL IMPERIO!" : "🤝 ¡EMPATE ÉPICO!";
    }
</script>
</body>
</html>
